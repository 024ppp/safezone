<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SafeZone">
<meta name="theme-color" content="#02050a">
<title>SafeZone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="version-tag">v1.0.7</div>

<div id="entry-screen">
  <button id="entry-button">静寂に入る</button>
  <div id="debug-controls">
    <button id="debug-button-gyro">[DEBUG] ジャイロ直行</button>
    <button id="debug-button-camera">[DEBUG] カメラ直行</button>
  </div>
</div>

<div id="main-app">
  <div id="hold-phase" class="phase-container">
    <div id="left-zone" class="touch-zone"></div>
    <div id="right-zone" class="touch-zone"></div>
    <div id="center-ui">
      <div id="breathing-circle"></div>
      <div id="status-text" class="status-text">左右を長押しし、<br>静寂を維持しなさい</div>
      <div id="timer" class="timer-display">00:30</div>
    </div>
  </div>

  <div id="gyro-phase" class="phase-container" style="display: none;">
    <div id="gyro-status" class="status-text">端末を胸の高さで<br>水平に保ちなさい</div>
    <div id="level-outer">
      <div id="level-inner"></div>
    </div>
    <div id="gyro-timer" class="timer-display">00:20</div>
  </div>

  <div id="camera-phase" class="phase-container" style="display: none;">
    <video id="camera-stream" autoplay playsinline></video>
    <div id="target-reticle"></div>
    <div id="camera-ui">
      <div id="camera-status" class="status-text">カメラを起動中...</div>
      <div id="camera-progress-bar"><div id="camera-progress-inner"></div></div>
    </div>
    <canvas id="camera-canvas" style="display:none;"></canvas>
  </div>
  <div id="complete-phase" class="phase-container" style="display: none;"></div>
</div>

<div id="overlay-penalty">
  <div id="penalty-text" class="status-text"></div>
</div>

<script src="app.js"></script>
</body>
</html>
